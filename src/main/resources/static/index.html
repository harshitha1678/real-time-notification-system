<!DOCTYPE html>
<html>
<head>

<title>Notifications</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

</head>

<body class="container mt-4">

<h2>Real-Time Notification System</h2>

<input
id="message"
class="form-control"
placeholder="Enter notification">

<button
class="btn btn-primary mt-2"
onclick="sendNotification()">

Send Notification

</button>

<h4 class="mt-4">
Notifications
</h4>

<ul
id="notificationList"
class="list-group">
</ul>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client/dist/sockjs.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js"></script>

<script>

let stompClient;

function connect() {

    let socket =
        new SockJS('/ws');

    stompClient =
        Stomp.over(socket);

    stompClient.connect({}, function() {

        stompClient.subscribe(
        '/topic/notifications',

        function(message) {

            let data =
            JSON.parse(
            message.body);

            let li =
            document.createElement('li');

            li.className =
            "list-group-item";

            li.innerText =
            data.message;

            document
            .getElementById(
            'notificationList')
            .prepend(li);
        });
    });
}

function sendNotification() {

    let msg =
    document.getElementById(
    'message').value;

    fetch(
    '/api/notifications',
    {

        method:'POST',

        headers:{
        'Content-Type':
        'application/json'
        },

        body:
        JSON.stringify({
        message:msg
        })
    });
}

connect();

</script>

</body>
</html>
